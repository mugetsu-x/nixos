# Catppuccin Macchiato, Blue accent.
#
# Wallpaper path is kept in sync with hyprpaper.conf by hand — hyprlock cannot
# read hyprpaper's config, so a wallpaper change means editing both files.

general {
  hide_cursor = true
  ignore_empty_input = true
  immediate_render = true
}

animations {
  enabled = true
  bezier = smooth, 0.25, 1, 0.5, 1
  animation = fade, 1, 4, smooth
  animation = inputFieldDots, 1, 2, smooth
}

background {
  monitor =
  path = ~/Pictures/wallpapers/hole.jpeg
  blur_passes = 3
  blur_size = 8
  noise = 0.0117
  contrast = 0.9
  brightness = 0.75
  vibrancy = 0.17
  vibrancy_darkness = 0.0
}

# Big clock.
label {
  monitor =
  text = cmd[update:1000] date +"%H:%M"
  color = rgba(cad3f5ff)
  font_size = 112
  font_family = JetBrainsMono Nerd Font ExtraBold
  position = 0, 220
  halign = center
  valign = center
  shadow_passes = 3
  shadow_size = 6
  shadow_color = rgba(0f0f17aa)
}

# Date, under the clock.
label {
  monitor =
  text = cmd[update:60000] date +"%A, %d %B"
  color = rgba(b7bdf8ff)
  font_size = 20
  font_family = JetBrainsMono Nerd Font
  position = 0, 130
  halign = center
  valign = center
}

# Greeting above the input field.
label {
  monitor =
  text =   Welcome back, kido
  color = rgba(a5adcbff)
  font_size = 15
  font_family = JetBrainsMono Nerd Font
  position = 0, -25
  halign = center
  valign = center
}

input-field {
  monitor =
  size = 320, 52
  outline_thickness = 2
  rounding = 16
  dots_size = 0.28
  dots_spacing = 0.35
  dots_center = true
  dots_rounding = -1

  outer_color = rgba(8aadf4ff)
  inner_color = rgba(24273acc)
  font_color = rgba(cad3f5ff)
  check_color = rgba(eed49fff)
  fail_color = rgba(ed8796ff)
  capslock_color = rgba(f5a97fff)

  placeholder_text = <span foreground="##6e738d"><i>󰌾  Enter password</i></span>
  fail_text = <span foreground="##ed8796"><i>$FAIL ($ATTEMPTS)</i></span>

  fade_on_empty = false
  hide_input = false
  position = 0, -90
  halign = center
  valign = center

  shadow_passes = 2
  shadow_size = 4
  shadow_color = rgba(0f0f1799)
}

# Bottom-left: uptime. Read from /proc directly — `uptime` here is coreutils,
# not procps, and has no -p flag.
label {
  monitor =
  text = cmd[update:60000] awk '{h=int($1/3600); m=int($1%3600/60); printf "󰅐  up %dh %dm", h, m}' /proc/uptime
  color = rgba(a5adcbcc)
  font_size = 13
  font_family = JetBrainsMono Nerd Font
  position = 32, 24
  halign = left
  valign = bottom
}

# Bottom-right: keyboard layout.
label {
  monitor =
  text = 󰌌  $LAYOUT
  color = rgba(a5adcbcc)
  font_size = 13
  font_family = JetBrainsMono Nerd Font
  position = -32, 24
  halign = right
  valign = bottom
}
