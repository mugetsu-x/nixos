# Monitors. The 1080p Dell sits *below* the ultrawide, horizontally centred
# under it: (3440 - 1920) / 2 = 760, and y = 1440 is the bottom of DP-2.
#
# Rates are pinned, not `preferred` — the EDID-preferred mode is only 60 Hz on
# both panels, well under what they can actually do.
#
# VRR is enabled on the ultrawide only, and as `2` (fullscreen windows only),
# not `1` (always). It is a QD-OLED: an always-on variable refresh rate makes it
# flicker on the desktop, where the frame rate lurches between ~1 Hz (idle) and
# 165 Hz (a blinking cursor). Fullscreen-only keeps it to games, which is the
# only place it helps anyway.
monitor=DP-2,3440x1440@164.90,0x0,1,vrr,2
monitor=DP-4,1920x1080@120.00,760x1440,1
# Fallback for anything else that gets plugged in.
monitor=,preferred,auto,auto

# Autostart
# hyprpaper, waybar, blueman-applet and cliphist are systemd user units (see
# home/modules/{wayland,services}.nix). mako is D-Bus activated on first
# notification. Only the polkit agent still needs starting by hand.
exec-once = /run/current-system/sw/lib/polkit-gnome/polkit-gnome-authentication-agent-1


# Keep launcher/notifications tidy
layerrule = noanim, ^(wofi|notifications)$
windowrulev2 = float, class:^(pavucontrol|nm-connection-editor|blueman-manager)$

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24


# Input: US International layout, no touchpad config
input {
  kb_layout = us
  kb_variant = altgr-intl
  follow_mouse = 0
}

# Look & feel
general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2
  col.active_border = rgba(8aadf4ff)
  col.inactive_border = rgba(494d64ff)
  layout = dwindle
}

# Binary space partitioning: a new window splits whichever window is focused.
# The split direction follows the focused window's shape — wide windows split
# left/right, tall ones split top/bottom. So on the ultrawide: window 1 is full
# screen, window 2 halves it down the middle, window 3 goes under window 2, and
# so on down the tree.
dwindle {
  # 2 = the new window always takes the right/bottom half. Without this the
  # side it lands on depends on where the mouse happens to be in the window.
  force_split = 2
  # Keep a pair's split direction when one of them closes, instead of
  # recomputing it from the new dimensions.
  preserve_split = true
  pseudotile = true
}

decoration {
  rounding = 8

  blur {
    enabled = true
    size = 5
    passes = 3
  }
}

# Keybindings
#
# The split: ALT drives the window manager (workspaces, focus, window state),
# SUPER launches things and drives the session.
#
# Hyprland grabs binds globally, before the focused app sees the key. So a
# modifier used here is a modifier taken away from every app. CTRL is left alone
# entirely for that reason — a CTRL,L bind means Ctrl+L never reaches the shell
# to clear it. ALT is a deliberate trade: ALT+1..9 here means Chrome and the
# PWAs no longer get Alt+1..9 for tab switching (use Ctrl+Tab instead).

# Launch / session — SUPER
bind = SUPER, SPACE, exec, wofi --show drun      # launcher
bind = SUPER, R, exec, kitty                     # terminal
bind = SUPER, escape, exec, hyprlock             # lock screen
bind = SUPER_SHIFT, escape, exit                 # quit Hyprland
bind = SUPER, P, exec, grim -g "$(slurp)" - | swappy -f -
bind = SUPER, bracketleft, exec, cliphist list | wofi --dmenu | wl-copy

# Window state — ALT
bind = ALT, Q, killactive                        # close current window
bind = ALT, F, fullscreen, 0
bind = ALT, V, togglefloating

# Focus (directional) — ALT. Moving the window — ALT+SHIFT, same keys.
bind = ALT, H, movefocus, l
bind = ALT, J, movefocus, d
bind = ALT, K, movefocus, u
bind = ALT, L, movefocus, r
bind = ALT, semicolon, cyclenext

bind = ALT_SHIFT, H, movewindow, l
bind = ALT_SHIFT, J, movewindow, d
bind = ALT_SHIFT, K, movewindow, u
bind = ALT_SHIFT, L, movewindow, r

# Flip the current pair between a left/right and a top/bottom split.
bind = ALT, apostrophe, togglesplit

# Workspaces: ALT+N switches, ALT+SHIFT+N moves the window there
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9

bind = ALT_SHIFT, 1, movetoworkspace, 1
bind = ALT_SHIFT, 2, movetoworkspace, 2
bind = ALT_SHIFT, 3, movetoworkspace, 3
bind = ALT_SHIFT, 4, movetoworkspace, 4
bind = ALT_SHIFT, 5, movetoworkspace, 5
bind = ALT_SHIFT, 6, movetoworkspace, 6
bind = ALT_SHIFT, 7, movetoworkspace, 7
bind = ALT_SHIFT, 8, movetoworkspace, 8
bind = ALT_SHIFT, 9, movetoworkspace, 9

# Mouse window management — ALT+drag to move, ALT+right-drag to resize
bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow

# Volume keys
bind = ,XF86AudioRaiseVolume, exec, pamixer -i 5 && notify-send "Vol ↑" "$(pamixer --get-volume)%"
bind = ,XF86AudioLowerVolume, exec, pamixer -d 5 && notify-send "Vol ↓" "$(pamixer --get-volume)%"
bind = ,XF86AudioMute,         exec, pamixer -t  && notify-send "Muted" "$(pamixer --get-volume)%"

# Media keys (playerctl drives Spotify and anything else MPRIS-aware)
bind = ,XF86AudioPlay,  exec, playerctl play-pause
bind = ,XF86AudioNext,  exec, playerctl next
bind = ,XF86AudioPrev,  exec, playerctl previous
bind = ,XF86AudioStop,  exec, playerctl stop
